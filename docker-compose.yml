version: '3.8'

services:
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/jwt_auth
      - JWT_SECRET=7x!A%gK2mP9$xL@wQ4dF6hJ8nB5vC3yR1zT0sU2qW
      - PORT=5000
    depends_on:
      - mongo
    networks:
      - jwt-network

  mongo:
    image: mongo:6
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - jwt-network

networks:
  jwt-network:
    driver: bridge

volumes:
  mongo-data:

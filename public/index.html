<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JWT Authentication Example</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <div class="form-container" id="authContainer">
      <!-- Login Form -->
      <div id="loginForm" class="form-section active">
        <h1>Login</h1>
        <form onsubmit="handleLogin(event)">
          <div class="form-group">
            <label for="loginUsername">Username</label>
            <input type="text" id="loginUsername" required>
          </div>
          <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" required>
          </div>
          <button type="submit" class="btn">Login</button>
          <p class="toggle-text">Don't have an account? <a href="#" onclick="toggleForms(event)">Register</a></p>
        </form>
        <div id="loginMessage" class="message"></div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="form-section">
        <h1>Register</h1>
        <form onsubmit="handleRegister(event)">
          <div class="form-group">
            <label for="registerUsername">Username</label>
            <input type="text" id="registerUsername" required>
          </div>
          <div class="form-group">
            <label for="registerPassword">Password</label>
            <input type="password" id="registerPassword" required>
          </div>
          <button type="submit" class="btn">Register</button>
          <p class="toggle-text">Already have an account? <a href="#" onclick="toggleForms(event)">Login</a></p>
        </form>
        <div id="registerMessage" class="message"></div>
      </div>
    </div>

    <!-- Dashboard (shown after login) -->
    <div id="dashboard" class="dashboard hidden">
      <div class="dashboard-header">
        <h1>Dashboard</h1>
        <button onclick="handleLogout()" class="btn btn-logout">Logout</button>
      </div>
      <div class="dashboard-content">
        <h2>Welcome, <span id="username"></span>!</h2>
        <p>You are authenticated with a valid JWT token.</p>
        
        <div class="profile-section">
          <h3>Your Profile</h3>
          <button onclick="loadProfile()" class="btn btn-small">Load Profile from Protected API</button>
          <div id="profileData" class="profile-data"></div>
        </div>

        <div class="token-section">
          <h3>Your JWT Token</h3>
          <div class="token-display" id="tokenDisplay"></div>
          <button onclick="copyToken()" class="btn btn-small">Copy Token</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
